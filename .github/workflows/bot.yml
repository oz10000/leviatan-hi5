name: Leviathan H5 - Verify and Run

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  verify-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate environment and imports
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          LIVE_MODE: 'false'
        run: |
          python -c "
          import config
          print('config module loaded')
          print('Testnet mode:', config.TESTNET)
          print('API Key set:', bool(config.OKX_API_KEY))
          print('Secret Key set:', bool(config.OKX_SECRET_KEY))
          print('Passphrase set:', bool(config.OKX_PASSPHRASE))
          print('Directories logs/ and data/ exist')
          "

      - name: Run Leviathan H5 (dry run / testnet)
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          LIVE_MODE: 'false'
          CAPITAL: '20'
          LEVERAGE: '5'
          TOP_N: '5'
          COOLDOWN: '300'
          MODE: 'A'
        run: |
          python launcher.py --mode run

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leviathan-logs-${{ github.run_id }}
          path: |
            data/trades.csv
            data/state.json
            logs/bot.log
          retention-days: 7
