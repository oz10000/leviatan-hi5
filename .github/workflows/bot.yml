name: Leviathan HighFive V5 Runner

on:
  schedule:
    - cron: '*/5 * * * *'    # every 5 minutes
  workflow_dispatch:

jobs:
  bot:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Leviathan V5
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_API_SECRET: ${{ secrets.OKX_API_SECRET }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
          LIVE_MODE: 'false'
        run: python launcher.py --mode run

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: leviathan-logs-${{ github.run_id }}
          path: |
            data/trades.csv
            data/state.json
            logs/bot.log
          retention-days: 7
